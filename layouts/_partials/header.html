<header class="site-header">
	<a class="site-title" href="{{ site.Home.RelPermalink }}">{{ site.Title }}</a>
	{{- with site.Home.Pages }}
		<nav class="site-nav" aria-label="Site">
			{{- range . }}
				<a href="{{ .RelPermalink }}"
					{{- if or (eq . $) ($.IsDescendant .) }} aria-current="page"{{ end -}}>{{ .LinkTitle }}</a>
			{{- end }}
		</nav>
	{{- end }}
</header>
